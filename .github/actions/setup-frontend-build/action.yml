name: Setup frontend build
description: Install frontend build prerequisites, generate the API client, and install frontend dependencies.

inputs:
  node-version:
    description: Node.js version to install.
    required: false
    default: "20.x"
runs:
  using: composite
  steps:
    - name: Setup Node.js ${{ inputs.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: "npm"
        cache-dependency-path: |
          package-lock.json
          client/package-lock.json
          frontend/package-lock.json

    - name: Install client dependencies
      working-directory: client
      shell: bash
      run: npm ci --prefer-offline --no-audit --no-fund

    - name: Generate API client from tracked OpenAPI spec
      working-directory: client
      shell: bash
      run: npm run generate

    - name: Verify client package
      working-directory: client
      shell: bash
      run: npm run build

    - name: Install frontend dependencies
      working-directory: frontend
      shell: bash
      run: npm ci --prefer-offline --no-audit --no-fund
