name: Setup frontend build
description: Install frontend build prerequisites, generate the API client, and install frontend dependencies.

inputs:
  node-version:
    description: Node.js version to install.
    required: false
    default: "20.x"
  api-url:
    description: API URL used when generating the client.
    required: false
    default: http://127.0.0.1:4352

runs:
  using: composite
  steps:
    - name: Setup Node.js ${{ inputs.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: "npm"
        cache-dependency-path: |
          client/package-lock.json
          frontend/package-lock.json

    - name: Install client dependencies
      working-directory: client
      shell: bash
      run: npm ci

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version-file: "backend/.python-version"

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        version: "0.9.18"
        enable-cache: true

    - name: Install Graphviz
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y libgraphviz-dev

    - name: Generate API client from OpenAPI spec
      working-directory: client
      shell: bash
      run: ./scripts/generate.sh
      env:
        API_URL: ${{ inputs.api-url }}

    - name: Verify client package
      working-directory: client
      shell: bash
      run: npm run build

    - name: Install frontend dependencies
      working-directory: frontend
      shell: bash
      run: npm ci
