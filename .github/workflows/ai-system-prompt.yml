name: Sync AI System Prompt Gist

on:
  push:
    branches: [main, production]
    paths:
      - "ai-server/app/prompts/system_prompt.md"
      - "ai-server/pyproject.toml"
      - "ai-server/script/update-system-prompt"
      - "ai-server/uv.lock"
      - "ai-server/utility_scripts/update_system_prompt.py"
      - ".github/workflows/ai-system-prompt.yml"
  workflow_dispatch:

env:
  SYSTEM_PROMPT_GIST_ID: fa841de953aed344794b1fc0281069d1
  SYSTEM_PROMPT_GIST_OWNER: andrewm-bakerst
  SYSTEM_PROMPT_GIST_FILE_NAME: system_prompt.md
  AI_SYSTEM_PROMPT_GIST_TOKEN: ${{ secrets.AI_SYSTEM_PROMPT_GIST_TOKEN }}

jobs:
  upload:
    name: Sync system prompt
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.9.18"
          enable-cache: true

      - name: Skip when Gist token is missing
        if: ${{ env.AI_SYSTEM_PROMPT_GIST_TOKEN == '' }}
        run: |
          echo "::notice::AI_SYSTEM_PROMPT_GIST_TOKEN is not configured; skipping Gist sync."

      - name: Sync system prompt
        if: ${{ env.AI_SYSTEM_PROMPT_GIST_TOKEN != '' }}
        working-directory: ai-server
        run: uv run update-system-prompt
