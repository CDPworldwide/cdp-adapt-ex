name: Deploy Orchestrator

on:
  push:
    branches: [main, production]
    paths:
      - "backend/**"
      - "frontend/**"
      - "client/**"
      - ".github/workflows/deploy.yml"
      - ".github/workflows/backend-deploy.yml"
      - ".github/workflows/frontend.yml"
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  ARTIFACT_REGISTRY: us-central1-docker.pkg.dev
  NODE_VERSION: "20.x"
  AI_SERVER_URL: https://cdp-ai-server-pbybuiwoxq-uc.a.run.app
  # Branch-specific environment configuration
  ENVIRONMENT: ${{ github.ref == 'refs/heads/production' && 'production' || 'development' }}
  SERVICE_NAME_BACKEND: ${{ github.ref == 'refs/heads/production' && 'cdp-server-prod' || 'cdp-server-dev' }}
  SERVICE_NAME_FRONTEND: ${{ github.ref == 'refs/heads/production' && 'frontend-prod' || 'frontend-dev' }}

jobs:
  deploy-backend:
    name: Deploy backend (${{ github.ref == 'refs/heads/production' && 'production' || 'development' }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      backend-url: ${{ steps.verify-backend.outputs.url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ env.PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Get Backend Secrets from Secret Manager
        id: backend-secrets
        uses: google-github-actions/get-secretmanager-secrets@v2
        with:
          secrets: |-
            API_KEY:${{ env.PROJECT_ID }}/${{ env.ENVIRONMENT }}-API_KEY

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.ARTIFACT_REGISTRY }} --quiet

      - name: Free disk space before Docker build
        run: |
          echo "Disk usage before cleanup:"
          df -h

          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /opt/hostedtoolcache/CodeQL || true

          docker system prune -af || true
          docker builder prune -af || true

          echo "Disk usage after cleanup:"
          df -h

      - name: Build and push backend Docker image
        working-directory: backend
        run: |
          IMAGE_TAG="${{ env.ARTIFACT_REGISTRY }}/${{ env.PROJECT_ID }}/cdp/${{ env.SERVICE_NAME_BACKEND }}:${{ github.sha }}"
          IMAGE_LATEST="${{ env.ARTIFACT_REGISTRY }}/${{ env.PROJECT_ID }}/cdp/${{ env.SERVICE_NAME_BACKEND }}:latest"

          docker build -t $IMAGE_TAG -t $IMAGE_LATEST .
          docker push $IMAGE_TAG
          docker push $IMAGE_LATEST

      - name: Deploy backend to Cloud Run
        id: deploy-backend-run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME_BACKEND }}
          region: ${{ env.REGION }}
          image: ${{ env.ARTIFACT_REGISTRY }}/${{ env.PROJECT_ID }}/cdp/${{ env.SERVICE_NAME_BACKEND }}:${{ github.sha }}
          flags: |
            --allow-unauthenticated
            --add-cloudsql-instances=${{ env.PROJECT_ID }}:${{ env.REGION }}:${{ env.ENVIRONMENT == 'production' && 'cdp-prod' || 'cdp-test' }}
            --min-instances=1
            --max-instances=10
            --memory=2Gi
            --cpu=2
            --timeout=300
          labels: |
            environment=${{ env.ENVIRONMENT }}
            managed-by=github-actions
            commit-sha=${{ github.sha }}
          secrets: |
            POSTGRES_PASSWORD=${{ env.ENVIRONMENT }}-POSTGRES_PASSWORD:latest
            API_KEY=${{ env.ENVIRONMENT }}-API_KEY:latest
            LLM_API_KEY=${{ env.ENVIRONMENT }}-LLM_API_KEY:latest
            GOOGLE_API_KEY=${{ env.ENVIRONMENT }}-LLM_API_KEY:latest
            ALLOWED_ORIGINS=${{ env.ENVIRONMENT }}-ALLOWED_ORIGINS:latest
            POSTGRES_HOST=${{ env.ENVIRONMENT }}-POSTGRES_HOST:latest
            POSTGRES_DB=${{ env.ENVIRONMENT }}-POSTGRES_DB:latest
            POSTGRES_USER=${{ env.ENVIRONMENT }}-POSTGRES_USER:latest
          env_vars: |
            PROJECT_ID=${{ env.PROJECT_ID }}
            LOCATION=${{ env.REGION }}
            APP_ENV=${{ env.ENVIRONMENT }}
            DEBUG=${{ env.ENVIRONMENT == 'development' && 'true' || 'false' }}
            LOG_FORMAT=json
            POSTGRES_PORT=5432
            LLM_MODEL=${{ secrets.LLM_MODEL || 'gemini-2.5-flash' }}
            DEFAULT_LLM_TEMPERATURE=0.2
            MAX_TOKENS=2000
            MAX_LLM_CALL_RETRIES=3
            RATE_LIMIT_CHAT=10 per minute
            RATE_LIMIT_SUGGEST_FOLLOW_UPS=10 per minute
          env_vars_update_strategy: overwrite

      - name: Verify backend revision and health
        id: verify-backend
        env:
          BACKEND_API_KEY: ${{ steps.backend-secrets.outputs.API_KEY }}
        run: |
          EXPECTED_SHA="${{ github.sha }}"
          BACKEND_URL=""

          echo "Waiting for ${{ env.SERVICE_NAME_BACKEND }} label commit-sha=$EXPECTED_SHA"
          for i in {1..24}; do
            SERVICE_JSON=$(gcloud run services describe ${{ env.SERVICE_NAME_BACKEND }} --region=${{ env.REGION }} --format=json)
            DEPLOYED_SHA=$(printf '%s' "$SERVICE_JSON" | python3 -c 'import json,sys; print(json.load(sys.stdin)["metadata"]["labels"].get("commit-sha", ""))')
            BACKEND_URL=$(printf '%s' "$SERVICE_JSON" | python3 -c 'import json,sys; print(json.load(sys.stdin)["status"].get("url", ""))')

            echo "Attempt $i/24: deployed_sha=$DEPLOYED_SHA url=$BACKEND_URL"
            if [ "$DEPLOYED_SHA" = "$EXPECTED_SHA" ] && [ -n "$BACKEND_URL" ]; then
              break
            fi

            if [ "$i" -eq 24 ]; then
              echo "Backend deploy did not converge to commit $EXPECTED_SHA"
              exit 1
            fi

            sleep 5
          done

          HEALTH_URL="$BACKEND_URL/api/v1/health"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "X-API-Key: $BACKEND_API_KEY" \
            "$HEALTH_URL" || echo "000")
          if [ "$STATUS" != "200" ]; then
            echo "Backend health check failed: $HEALTH_URL -> HTTP $STATUS"
            exit 1
          fi

          # Encode the URL without newlines to bypass GHA secret suppression
          ENCODED_URL=$(printf "%s" "$BACKEND_URL" | base64 -w 0)
          echo "url=$ENCODED_URL" >> "$GITHUB_OUTPUT"
          echo "Backend ready: $BACKEND_URL"

  deploy-frontend:
    name: Deploy frontend (${{ github.ref == 'refs/heads/production' && 'production' || 'development' }})
    runs-on: ubuntu-latest
    needs: deploy-backend
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Decode Backend URL
        id: decode-url
        run: |
          DECODED_URL=$(printf "%s" "${{ needs.deploy-backend.outputs.backend-url }}" | base64 -d)
          echo "url=$DECODED_URL" >> "$GITHUB_OUTPUT"

          # Optional: Mask it locally so it doesn't leak in frontend logs
          echo "::add-mask::$DECODED_URL"

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: |
            client/package-lock.json
            frontend/package-lock.json

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "backend/.python-version"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.9.18"
          enable-cache: true

      - name: Install Graphviz
        run: |
          sudo apt-get update
          sudo apt-get install -y libgraphviz-dev

      - name: Generate API client from OpenAPI spec
        working-directory: client
        run: ./scripts/generate.sh
        env:
          API_URL: http://127.0.0.1:4352

      - name: Verify client package
        working-directory: client
        run: npm run build

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ env.PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Get Frontend Secrets from Secret Manager
        id: frontend-secrets
        uses: google-github-actions/get-secretmanager-secrets@v2
        with:
          secrets: |-
            API_KEY:${{ env.PROJECT_ID }}/${{ env.ENVIRONMENT }}-API_KEY
            GOOGLE_MAPS_API_KEY:${{ env.PROJECT_ID }}/${{ env.ENVIRONMENT }}-GOOGLE_MAPS_API_KEY

      - name: Create production environment.ts
        working-directory: frontend
        run: |
          FRONTEND_BASE_URL='${{ steps.decode-url.outputs.url }}' \
          FRONTEND_AI_SERVER_URL='${{ env.AI_SERVER_URL }}' \
          FRONTEND_API_KEY='${{ steps.frontend-secrets.outputs.API_KEY }}' \
          FRONTEND_AI_SERVER_API_KEY='${{ secrets.AI_SERVER_API_KEY }}' \
          FRONTEND_DEBUG_MODE='${{ env.ENVIRONMENT == 'development' }}' \
          FRONTEND_MAPS_API_KEY='${{ steps.frontend-secrets.outputs.GOOGLE_MAPS_API_KEY }}' \
          bash scripts/write-environment.sh

      - name: Validate generated frontend environment
        working-directory: frontend
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          text = Path('src/environments/environment.ts').read_text(encoding='utf-8')

          def extract(name: str) -> str:
              match = re.search(rf"{name}: '([^']*)'", text)
              return match.group(1) if match else ''

          values = {
              'baseUrl': extract('baseUrl'),
              'aiServerUrl': extract('aiServerUrl'),
              'apiKey': extract('apiKey'),
              'apiKeyHeaderName': extract('apiKeyHeaderName'),
              'aiServerApiKey': extract('aiServerApiKey'),
              'aiServerApiKeyHeaderName': extract('aiServerApiKeyHeaderName'),
          }

          for key, value in values.items():
              print(f"{key}_set={'yes' if value else 'no'}")
              if value:
                  print(f"{key}_length={len(value)}")

          missing = [key for key in ('baseUrl', 'aiServerUrl', 'apiKey', 'aiServerApiKey') if not values[key]]
          if missing:
              raise SystemExit(f"Missing generated frontend environment values: {', '.join(missing)}")
          PY

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Run frontend tests
        working-directory: frontend
        run: npm run test:ci

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.ARTIFACT_REGISTRY }} --quiet

      - name: Build and push frontend Docker image
        working-directory: frontend
        run: |
          IMAGE_TAG="${{ env.ARTIFACT_REGISTRY }}/${{ env.PROJECT_ID }}/cdp/${{ env.SERVICE_NAME_FRONTEND }}:${{ github.sha }}"
          IMAGE_LATEST="${{ env.ARTIFACT_REGISTRY }}/${{ env.PROJECT_ID }}/cdp/${{ env.SERVICE_NAME_FRONTEND }}:latest"
          IMAGE_ENV="${{ env.ARTIFACT_REGISTRY }}/${{ env.PROJECT_ID }}/cdp/${{ env.SERVICE_NAME_FRONTEND }}:${{ env.ENVIRONMENT }}"

          docker build -t $IMAGE_TAG -t $IMAGE_LATEST -t $IMAGE_ENV .
          docker push $IMAGE_TAG
          docker push $IMAGE_LATEST
          docker push $IMAGE_ENV

      - name: Deploy frontend to Cloud Run
        id: deploy-frontend
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME_FRONTEND }}
          region: ${{ env.REGION }}
          image: ${{ env.ARTIFACT_REGISTRY }}/${{ env.PROJECT_ID }}/cdp/${{ env.SERVICE_NAME_FRONTEND }}:${{ github.sha }}
          flags: |
            --allow-unauthenticated
            --min-instances=0
            --max-instances=10
            --memory=512Mi
            --cpu=1
            --timeout=60
            --port=8080
          labels: |
            environment=${{ env.ENVIRONMENT }}
            managed-by=github-actions
            commit-sha=${{ github.sha }}

      - name: Verify frontend deployment health
        run: |
          URL="${{ steps.deploy-frontend.outputs.url }}"
          echo "Checking health of ${{ env.ENVIRONMENT }} frontend at $URL..."
          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Frontend deployment is healthy (HTTP $STATUS)"
              echo "Backend URL wired into frontend: ${{ needs.deploy-backend.outputs.backend-url }}"
              exit 0
            fi
            echo "Attempt $i/10: HTTP $STATUS, waiting 5s..."
            sleep 5
          done
          echo "Frontend deployment health check failed"
          exit 1
