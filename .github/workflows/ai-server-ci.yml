name: AI Server CI

on:
  push:
    branches: [main, production]
    paths:
      - "ai-server/**"
      - ".github/workflows/ai-server-ci.yml"
      - ".github/workflows/ai-server-deploy.yml"
  pull_request:
    branches: [main, production]
    paths:
      - "ai-server/**"
      - ".github/workflows/ai-server-ci.yml"
      - ".github/workflows/ai-server-deploy.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: AI server CI / lint, test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install pre-commit
        run: python -m pip install pre-commit

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.9.18"
          enable-cache: true

      - name: Run pre-commit checks
        run: |
          pre-commit run --show-diff-on-failure --files \
            .pre-commit-config.yaml \
            .github/workflows/ai-server-ci.yml \
            .github/workflows/ai-server-deploy.yml \
            $(git ls-files 'ai-server/**')

      - name: Install project dependencies
        working-directory: ai-server
        run: uv sync

      - name: Run linter
        working-directory: ai-server
        run: uv run ruff check .

      - name: Byte-compile python code
        working-directory: ai-server
        run: python -m compileall .

      - name: Run tests
        working-directory: ai-server
        run: uv run pytest -q
