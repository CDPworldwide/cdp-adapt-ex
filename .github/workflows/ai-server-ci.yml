name: AI Server CI

on:
  push:
    branches: [main, production]
    paths:
      - "ai-server/**"
      - ".github/workflows/ai-server-ci.yml"
      - ".github/workflows/ai-server-deploy.yml"
  pull_request:
    branches: [main, production]
    paths:
      - "ai-server/**"
      - ".github/workflows/ai-server-ci.yml"
      - ".github/workflows/ai-server-deploy.yml"

jobs:
  lint-and-test:
    name: Lint and test ai-server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.9.18"
          enable-cache: true

      - name: Install project dependencies
        working-directory: ai-server
        run: uv sync

      - name: Check formatting
        working-directory: ai-server
        run: uv run ruff format --check .

      - name: Run linter
        working-directory: ai-server
        run: uv run ruff check .

      - name: Byte-compile python code
        working-directory: ai-server
        run: python -m compileall .

      - name: Run tests
        working-directory: ai-server
        run: uv run pytest -q
