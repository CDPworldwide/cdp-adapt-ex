name: Backend CI

# Runs on pushes and pull requests to long-lived integration branches
on:
  push:
    branches: [main, production]
    paths:
      - "backend/**"
  pull_request:
    branches: [main, production]
    paths:
      - "backend/**"

jobs:
  # Lints, compiles, and tests the backend
  lint-and-test:
    name: Lint, compile & test backend
    runs-on: ubuntu-latest

    steps:
      # Checks out the repo under $GITHUB_WORKSPACE, so the job can access it
      - name: Checkout repository
        uses: actions/checkout@v4

      # Sets up a specific version of Python
      - name: Set up Python 3.13
        uses: actions/setup-python@v4
        with:
          python-version-file: "backend/.python-version"

      # Needed for pygraphviz
      - name: Install Graphviz
        run: |
          sudo apt-get update
          sudo apt-get install -y libgraphviz-dev

      # https://docs.astral.sh/uv/guides/integration/github/#installation
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          # Install a specific version of uv.
          version: "0.9.18"
          enable-cache: true

      - name: Install the project
        working-directory: backend
        run: uv sync

      # Runs the linter
      - name: Run formatter (ruff)
        working-directory: backend
        run: |
          uv run ruff format app/

      # Runs the linter
      - name: Run linter (ruff)
        working-directory: backend
        run: |
          uv run ruff check app/

      # Byte-compiles the Python code to check for syntax errors
      - name: Byte-compile python code (quick import-check / syntax)
        working-directory: backend
        run: python -m compileall .

      # Runs the backend tests
      - name: Run tests
        working-directory: backend
        run: |
          APP_ENV=test uv run pytest -q || (if [ $? -eq 5 ]; then echo "No tests found, passing." && exit 0; else exit $?; fi)

      # Regenerates openapi.json from the backend and fails if it differs
      # from the committed version
      - name: Check API client is in sync
        if: github.event_name == 'pull_request'
        run: |
          cp client/openapi.json client/openapi.json.committed
          cd backend
          SKIP_DATABASE_INIT=true uv run uvicorn app.main:app --host 127.0.0.1 --port 4352 &
          SERVER_PID=$!
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:4352/openapi.json -o ../client/openapi.json; then
              break
            fi
            sleep 1
          done
          kill $SERVER_PID 2>/dev/null || true
          cd ..
          # Normalize trailing newlines before comparing
          sed -i -e '$a\' client/openapi.json.committed 2>/dev/null || true
          sed -i -e '$a\' client/openapi.json 2>/dev/null || true
          if ! diff -q client/openapi.json.committed client/openapi.json > /dev/null 2>&1; then
            echo "::error::client/openapi.json is out of sync with the backend."
            echo ""
            echo "The committed openapi.json does not match what the backend generates."
            echo "Run 'npm run client' and commit the updated client/openapi.json."
            echo ""
            echo "Diff:"
            diff client/openapi.json.committed client/openapi.json || true
            exit 1
          fi
          echo "✓ client/openapi.json is in sync with the backend."
          rm -f client/openapi.json.committed
