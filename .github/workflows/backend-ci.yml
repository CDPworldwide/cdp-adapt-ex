name: Backend CI

# Runs on pushes and pull requests to long-lived integration branches
on:
  push:
    branches: [main, production]
    paths:
      - "backend/**"
  pull_request:
    branches: [main, production]
    paths:
      - "backend/**"

jobs:
  # Lints, compiles, and tests the backend
  lint-and-test:
    name: Lint, compile & test backend
    runs-on: ubuntu-latest

    steps:
      # Checks out the repo under $GITHUB_WORKSPACE, so the job can access it
      - name: Checkout repository
        uses: actions/checkout@v4

      # Sets up a specific version of Python
      - name: Set up Python 3.13
        uses: actions/setup-python@v4
        with:
          python-version-file: "backend/.python-version"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json

      # Needed for pygraphviz
      - name: Install Graphviz
        run: |
          sudo apt-get update
          sudo apt-get install -y libgraphviz-dev

      # https://docs.astral.sh/uv/guides/integration/github/#installation
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          # Install a specific version of uv.
          version: "0.9.18"
          enable-cache: true

      - name: Install the project
        working-directory: backend
        run: uv sync

      # Runs the linter
      - name: Run formatter (ruff)
        working-directory: backend
        run: |
          uv run ruff format app/

      # Runs the linter
      - name: Run linter (ruff)
        working-directory: backend
        run: |
          uv run ruff check app/

      # Byte-compiles the Python code to check for syntax errors
      - name: Byte-compile python code (quick import-check / syntax)
        working-directory: backend
        run: python -m compileall .

      # Runs the backend tests
      - name: Run tests
        working-directory: backend
        run: |
          APP_ENV=test uv run pytest -q || (if [ $? -eq 5 ]; then echo "No tests found, passing." && exit 0; else exit $?; fi)

      - name: Install client dependencies
        if: github.event_name == 'pull_request'
        working-directory: client
        run: npm ci

      # Regenerates the OpenAPI spec and client as part of CI instead of
      # requiring committed generated files to stay in sync.
      - name: Generate and build API client
        if: github.event_name == 'pull_request'
        run: |
          cd backend
          SKIP_DATABASE_INIT=true uv run uvicorn app.main:app --host 127.0.0.1 --port 4352 &
          SERVER_PID=$!
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:4352/openapi.json -o ../client/openapi.json; then
              break
            fi
            sleep 1
          done
          kill $SERVER_PID 2>/dev/null || true
          cd ../client
          npm run generate
          npm run build
