name: Docs CI

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "package.json"
      - "package-lock.json"
      - ".nvmrc"
      - ".github/workflows/docs-pages.yml"
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, production]
    paths:
      - "docs/**"
      - "package.json"
      - "package-lock.json"
      - ".nvmrc"
      - ".github/workflows/docs-pages.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-ci-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate standalone docs build
        run: npm run docs:validate

      - name: Validate frontend docs artifact build
        run: npm run docs:build:frontend
