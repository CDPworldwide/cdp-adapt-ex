name: Frontend CI

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "test/**"
      - "client/**"
      - ".github/actions/setup-frontend-build/**"
      - ".github/workflows/frontend.yml"
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, production]
    paths:
      - "frontend/**"
      - "test/**"
      - "client/**"
      - ".github/actions/setup-frontend-build/**"
      - ".github/workflows/frontend.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  ARTIFACT_REGISTRY: us-central1-docker.pkg.dev
  AI_SERVER_URL: https://cdp-ai-server-pbybuiwoxq-uc.a.run.app
  ENVIRONMENT: ${{ github.ref == 'refs/heads/production' && 'production' || 'development' }}
  NODE_VERSION: "20.x"

jobs:
  build-and-test:
    name: Frontend CI / build, lint, test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event.action != 'closed' && (github.event_name != 'pull_request' || github.event.pull_request.draft == false)
    permissions:
      contents: read
      id-token: write
    outputs:
      backend-url: ${{ steps.backend-url.outputs.url }}
    env:
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      SLACK_I18N_CHANNEL_ID: ${{ secrets.SLACK_I18N_CHANNEL_ID }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup frontend build
        uses: ./.github/actions/setup-frontend-build
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Check translation parity
        id: i18n-coverage
        working-directory: frontend
        run: |
          npm run i18n:coverage 2>&1 | tee i18n-coverage.txt
          report="$(awk '/^Translation coverage/{flag=1} /^Run with --show-keys/{flag=0} flag{print}' i18n-coverage.txt)"

          {
            echo "report<<EOF"
            printf '%s\n' "$report"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          I18N_COVERAGE_REPORT="$report" python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          rows = []
          for line in Path("i18n-coverage.txt").read_text(encoding="utf-8").splitlines():
              parts = line.split()
              if len(parts) >= 11 and parts[1].endswith("%") and parts[3].isdigit():
                  rows.append(
                      {
                          "locale": parts[0],
                          "coverage": parts[1],
                          "translated": parts[2],
                          "needs_translation": int(parts[3]),
                          "needs_translation_pct": parts[4],
                          "missing": int(parts[5]),
                          "empty": int(parts[6]),
                          "same_as_master": int(parts[7]),
                          "type": int(parts[8]),
                          "issues": int(parts[9]),
                          "extra": int(parts[10]),
                      }
                  )

          warning_rows = [
              row
              for row in rows
              if row["needs_translation"] > 0 or row["type"] > 0
          ]
          if warning_rows:
              summary = ", ".join(
                  f'{row["locale"]}: {row["needs_translation_pct"]} needs translation '
                  f'({row["needs_translation"]} keys; {row["same_as_master"]} same as master)'
                  for row in warning_rows
              )
              print(f"::warning title=Translations need updates::{summary}")

          report = os.environ.get("I18N_COVERAGE_REPORT", "")
          if not (report and os.environ.get("SLACK_BOT_TOKEN") and os.environ.get("SLACK_I18N_CHANNEL_ID")):
              raise SystemExit(0)

          sha = os.environ["GITHUB_SHA"][:7]
          run_url = (
              f'{os.environ["GITHUB_SERVER_URL"]}/'
              f'{os.environ["GITHUB_REPOSITORY"]}/actions/runs/{os.environ["GITHUB_RUN_ID"]}'
          )
          summary = ", ".join(
              f'{row["locale"]} {row["coverage"]} ({row["translated"]})' for row in rows
          )
          details = "\n".join(
              (
                  f'- `{row["locale"]}`: {row["coverage"]} translated '
                  f'({row["translated"]}); {row["needs_translation_pct"]} needs translation '
                  f'({row["needs_translation"]} keys), {row["missing"]} missing keys, '
                  f'{row["empty"]} empty, '
                  f'{row["same_as_master"]} same as master, {row["type"]} type mismatches, '
                  f'{row["issues"]} total issues, {row["extra"]} extra'
              )
              for row in rows
          )
          text = (
              f'*Translation parity* for `{os.environ["GITHUB_REF_NAME"]}` (`{sha}`)\n'
              f'{summary or "Coverage report generated."}\n\n'
              f'{details or f"```{report}```"}\n\n'
              f'<{run_url}|View GitHub Actions run>'
          )
          payload = {
              "channel": os.environ["SLACK_I18N_CHANNEL_ID"],
              "text": text,
          }
          Path("i18n-slack-payload.json").write_text(json.dumps(payload), encoding="utf-8")
          PY

          if [ -s i18n-slack-payload.json ]; then
            echo "should_post=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_post=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Post translation coverage to Slack
        if: steps.i18n-coverage.outputs.should_post == 'true'
        uses: slackapi/slack-github-action@v3.0.3
        with:
          errors: true
          method: chat.postMessage
          token: ${{ env.SLACK_BOT_TOKEN }}
          payload-file-path: frontend/i18n-slack-payload.json

      - name: Cache client build
        uses: actions/cache@v4
        with:
          path: client/dist
          key: client-build-${{ github.sha }}

      # - name: Install integration test dependencies
      #   if: github.event_name == 'pull_request'
      #   working-directory: test
      #   run: npm ci

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Determine backend URL
        id: backend-url
        run: |
          if [ "${{ github.ref }}" = "refs/heads/production" ]; then
            BACKEND_SERVICE="cdp-server-prod"
            BACKEND_URL=$(gcloud run services describe $BACKEND_SERVICE \
              --region=us-central1 \
              --format='value(status.url)')
          else
            BACKEND_SERVICE="cdp-server-dev"
            BACKEND_URL=$(gcloud run services describe $BACKEND_SERVICE \
              --region=us-central1 \
              --format='value(status.url)')
          fi

          echo "url=$BACKEND_URL" >> $GITHUB_OUTPUT
          echo "Final backend URL: $BACKEND_URL"

      - name: Get Frontend Secrets from Secret Manager
        id: frontend-secrets
        uses: google-github-actions/get-secretmanager-secrets@v2
        with:
          secrets: |-
            API_KEY:${{ secrets.GCP_PROJECT_ID }}/${{ env.ENVIRONMENT }}-API_KEY
            AI_SERVER_API_KEY:${{ secrets.GCP_PROJECT_ID }}/shared-AI_SERVER_API_KEY
            GOOGLE_MAPS_API_KEY:${{ secrets.GCP_PROJECT_ID }}/${{ env.ENVIRONMENT }}-GOOGLE_MAPS_API_KEY

      - name: Create environment.ts
        working-directory: frontend
        run: |
          FRONTEND_BASE_URL='${{ steps.backend-url.outputs.url }}' \
          FRONTEND_AI_SERVER_URL='${{ env.AI_SERVER_URL }}' \
          FRONTEND_API_KEY='${{ steps.frontend-secrets.outputs.API_KEY }}' \
          FRONTEND_AI_SERVER_API_KEY='${{ steps.frontend-secrets.outputs.AI_SERVER_API_KEY }}' \
          FRONTEND_AUTH_DISABLED='false' \
          FRONTEND_DEBUG_MODE='${{ env.ENVIRONMENT == 'development' }}' \
          FRONTEND_MAPS_API_KEY='${{ steps.frontend-secrets.outputs.GOOGLE_MAPS_API_KEY }}' \
          FRONTEND_POSTHOG_KEY='${{ vars.FRONTEND_POSTHOG_KEY }}' \
          FRONTEND_POSTHOG_HOST='${{ vars.FRONTEND_POSTHOG_HOST }}' \
          FRONTEND_POSTHOG_UI_HOST='${{ vars.FRONTEND_POSTHOG_UI_HOST }}' \
          FRONTEND_POSTHOG_ENABLED='${{ vars.FRONTEND_POSTHOG_ENABLED }}' \
          FRONTEND_SENTRY_DSN='${{ vars.FRONTEND_SENTRY_DSN }}' \
          FRONTEND_SENTRY_ENABLED='${{ vars.FRONTEND_SENTRY_ENABLED }}' \
          FRONTEND_SENTRY_ENVIRONMENT='${{ env.ENVIRONMENT }}' \
          FRONTEND_SENTRY_RELEASE='${{ github.sha }}' \
          FRONTEND_SENTRY_TRACES_SAMPLE_RATE='${{ vars.FRONTEND_SENTRY_TRACES_SAMPLE_RATE }}' \
          bash scripts/write-environment.sh

      - name: Validate generated frontend environment
        working-directory: frontend
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          text = Path('src/environments/environment.ts').read_text(encoding='utf-8')

          def extract(name: str) -> str:
              match = re.search(rf"{name}: '([^']*)'", text)
              return match.group(1) if match else ''

          values = {
              'baseUrl': extract('baseUrl'),
              'aiServerUrl': extract('aiServerUrl'),
              'apiKey': extract('apiKey'),
              'aiServerApiKey': extract('aiServerApiKey'),
              'posthogKey': extract('key'),
          }

          for key, value in values.items():
              print(f"{key}_set={'yes' if value else 'no'}")
              if value:
                  print(f"{key}_length={len(value)}")

          required = ('baseUrl', 'aiServerUrl', 'apiKey', 'aiServerApiKey')
          missing = [key for key in required if not values[key]]
          if missing:
              raise SystemExit(f"Missing generated frontend environment values: {', '.join(missing)}")
          PY

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Check bundle size
        working-directory: frontend
        run: |
          BUNDLE_SIZE=$(du -sk dist/frontend/browser | cut -f1)
          echo "Bundle size: ${BUNDLE_SIZE}KB"
          if [ "$BUNDLE_SIZE" -gt 1024 ]; then
            echo "⚠️ Warning: Bundle size (${BUNDLE_SIZE}KB) exceeds 1MB"
          fi

      - name: Set up Chrome for testing
        uses: browser-actions/setup-chrome@v2
        with:
          install-dependencies: true

      - name: Run frontend tests
        working-directory: frontend
        run: npm run test:ci

      # - name: Run chat eval regression suite
      #   if: github.event_name == 'pull_request'
      #   working-directory: test
      #   env:
      #     API_BASE_URL: ${{ steps.backend-url.outputs.url }}
      #     CHAT_EVAL_MIN_RECALL: "1"
      #     CHAT_EVAL_MIN_PRECISION: "1"
      #     CHAT_EVAL_SUMMARY_PATH: ./artifacts/chat-eval-summary.json
      #   run: npm run test:chat-eval:ci

      - name: Run security audit
        working-directory: frontend
        run: npm audit --audit-level=moderate || true
        continue-on-error: true

      - name: Upload build artifacts
        if: success() && (github.event_name == 'push' || github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch')
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build-${{ github.sha }}
          path: frontend/dist/frontend/browser
          retention-days: 7

      - name: Upload test coverage
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ github.sha }}
          path: frontend/coverage
          retention-days: 7
        continue-on-error: true

      # - name: Upload chat eval summary
      #   if: success() && github.event_name == 'pull_request'
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: chat-eval-summary-${{ github.sha }}
      #     path: test/artifacts/chat-eval-summary.json
      #     retention-days: 7

  deploy-preview:
    name: Frontend preview / deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build-and-test
    if: github.event_name == 'pull_request' && github.event.pull_request.draft == false
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    env:
      BACKEND_SERVICE_NAME: cdp-server-dev
      SERVICE_NAME: frontend-preview-pr-${{ github.event.pull_request.number }}
      ENVIRONMENT: development

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup frontend build
        uses: ./.github/actions/setup-frontend-build
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ env.PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Determine backend URL
        id: backend-url
        run: |
          BACKEND_URL=$(gcloud run services describe ${{ env.BACKEND_SERVICE_NAME }} \
            --region=${{ env.REGION }} \
            --format='value(status.url)' 2>/dev/null || echo "")

          if [ -z "$BACKEND_URL" ]; then
            echo "Backend service ${{ env.BACKEND_SERVICE_NAME }} not found"
            exit 1
          fi

          echo "url=$BACKEND_URL" >> "$GITHUB_OUTPUT"
          echo "Backend URL (${{ env.BACKEND_SERVICE_NAME }}): $BACKEND_URL"

      - name: Get Frontend Secrets from Secret Manager
        id: frontend-secrets
        uses: google-github-actions/get-secretmanager-secrets@v2
        with:
          secrets: |-
            API_KEY:${{ env.PROJECT_ID }}/${{ env.ENVIRONMENT }}-API_KEY
            AI_SERVER_API_KEY:${{ env.PROJECT_ID }}/shared-AI_SERVER_API_KEY
            GOOGLE_MAPS_API_KEY:${{ env.PROJECT_ID }}/${{ env.ENVIRONMENT }}-GOOGLE_MAPS_API_KEY

      - name: Create environment.ts
        working-directory: frontend
        run: |
          FRONTEND_BASE_URL='${{ steps.backend-url.outputs.url }}' \
          FRONTEND_AI_SERVER_URL='${{ env.AI_SERVER_URL }}' \
          FRONTEND_API_KEY='${{ steps.frontend-secrets.outputs.API_KEY }}' \
          FRONTEND_AI_SERVER_API_KEY='${{ steps.frontend-secrets.outputs.AI_SERVER_API_KEY }}' \
          FRONTEND_AUTH_DISABLED='false' \
          FRONTEND_DEBUG_MODE='true' \
          FRONTEND_MAPS_API_KEY='${{ steps.frontend-secrets.outputs.GOOGLE_MAPS_API_KEY }}' \
          FRONTEND_POSTHOG_KEY='${{ vars.FRONTEND_POSTHOG_KEY }}' \
          FRONTEND_POSTHOG_HOST='${{ vars.FRONTEND_POSTHOG_HOST }}' \
          FRONTEND_POSTHOG_ENABLED='${{ vars.FRONTEND_POSTHOG_ENABLED }}' \
          FRONTEND_SENTRY_DSN='${{ vars.FRONTEND_SENTRY_DSN }}' \
          FRONTEND_SENTRY_ENABLED='${{ vars.FRONTEND_SENTRY_ENABLED }}' \
          FRONTEND_SENTRY_ENVIRONMENT='${{ env.ENVIRONMENT }}' \
          FRONTEND_SENTRY_RELEASE='${{ github.sha }}' \
          FRONTEND_SENTRY_TRACES_SAMPLE_RATE='${{ vars.FRONTEND_SENTRY_TRACES_SAMPLE_RATE }}' \
          bash scripts/write-environment.sh

      - name: Validate generated frontend environment
        working-directory: frontend
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          text = Path('src/environments/environment.ts').read_text(encoding='utf-8')

          def extract(name: str) -> str:
              match = re.search(rf"{name}: '([^']*)'", text)
              return match.group(1) if match else ''

          values = {
              'baseUrl': extract('baseUrl'),
              'aiServerUrl': extract('aiServerUrl'),
              'apiKey': extract('apiKey'),
              'aiServerApiKey': extract('aiServerApiKey'),
              'posthogKey': extract('key'),
          }

          for key, value in values.items():
              print(f"{key}_set={'yes' if value else 'no'}")
              if value:
                  print(f"{key}_length={len(value)}")

          required = ('baseUrl', 'aiServerUrl', 'apiKey', 'aiServerApiKey')
          missing = [key for key in required if not values[key]]
          if missing:
              raise SystemExit(f"Missing generated frontend environment values: {', '.join(missing)}")
          PY

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.ARTIFACT_REGISTRY }} --quiet

      - name: Build and push Docker image
        working-directory: frontend
        run: |
          IMAGE_TAG="${{ env.ARTIFACT_REGISTRY }}/${{ env.PROJECT_ID }}/cdp/${{ env.SERVICE_NAME }}:${{ github.sha }}"
          IMAGE_LATEST="${{ env.ARTIFACT_REGISTRY }}/${{ env.PROJECT_ID }}/cdp/${{ env.SERVICE_NAME }}:latest"

          docker build -t $IMAGE_TAG -t $IMAGE_LATEST .
          docker push $IMAGE_TAG
          docker push $IMAGE_LATEST

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.ARTIFACT_REGISTRY }}/${{ env.PROJECT_ID }}/cdp/${{ env.SERVICE_NAME }}:${{ github.sha }}
          flags: |
            --allow-unauthenticated
            --min-instances=0
            --max-instances=2
            --memory=512Mi
            --cpu=1
            --timeout=60
            --port=8080
          labels: |
            environment=preview
            managed-by=github-actions
            commit-sha=${{ github.sha }}
            pr-number=${{ github.event.pull_request.number }}

      - name: Verify deployment health
        run: |
          URL="${{ steps.deploy.outputs.url }}"
          echo "Checking health of $URL..."
          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Deployment is healthy (HTTP $STATUS)"
              exit 0
            fi
            echo "Attempt $i/10: HTTP $STATUS, waiting 5s..."
            sleep 5
          done
          echo "Deployment health check failed"
          exit 1

      - name: Comment PR with preview URL
        if: github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ## Frontend Preview Deployed

            **URL:** ${{ steps.deploy.outputs.url }}
            **Commit:** `${{ github.sha }}`
            **Environment:** preview (PR #${{ github.event.pull_request.number }})
            **Backend:** ${{ steps.backend-url.outputs.url }} (`${{ env.BACKEND_SERVICE_NAME }}`)
            **AI Server:** ${{ env.AI_SERVER_URL }}

            ### Test Credentials
            Use these credentials to login to the preview:
            - **Email:** `test@example.com`
            - **Password:** `TestPassword123!`

            ### Quick Test
            ```bash
            open ${{ steps.deploy.outputs.url }}
            ```

            This preview environment is isolated per PR and will remain active until the PR is closed.
