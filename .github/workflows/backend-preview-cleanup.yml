name: Backend Preview Cleanup

on:
  pull_request:
    types: [closed]
    branches: [main, production]

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1

jobs:
  cleanup-preview:
    name: Backend preview / cleanup
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      pull-requests: write

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ env.PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Delete preview service
        run: |
          SERVICE_NAME="cdp-server-preview-pr-${{ github.event.pull_request.number }}"
          gcloud run services delete "$SERVICE_NAME" \
            --region=${{ env.REGION }} \
            --quiet || echo "Service already deleted or not found"

      - name: Comment PR about cleanup
        if: github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ## Backend Preview Environment Cleaned Up

            The preview deployment `cdp-server-preview-pr-${{ github.event.pull_request.number }}` has been deleted.
