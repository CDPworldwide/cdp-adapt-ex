name: Backend Preview Cleanup

on:
  pull_request:
    types: [closed]
    branches: [main, production]

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1

jobs:
  cleanup-preview:
    name: Backend preview / cleanup
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      pull-requests: write

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ env.PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Delete preview service
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          LEGACY_SERVICE="cdp-server-preview-pr-${PR_NUMBER}"

          while IFS= read -r service; do
            if [ -z "$service" ]; then
              continue
            fi

            echo "Deleting backend preview service $service"
            gcloud run services delete "$service" \
              --region=${{ env.REGION }} \
              --quiet || echo "Service already deleted or not found"
          done < <(
            {
              gcloud run services list \
                --region=${{ env.REGION }} \
                --filter="metadata.labels.pr-number=${PR_NUMBER} AND metadata.labels.component=backend" \
                --format='value(metadata.name)'
              printf '%s\n' "$LEGACY_SERVICE"
            } | sort -u
          )

      - name: Comment PR about cleanup
        if: github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ## Backend Preview Environment Cleaned Up

            All backend preview deployments for PR #${{ github.event.pull_request.number }} have been deleted.
