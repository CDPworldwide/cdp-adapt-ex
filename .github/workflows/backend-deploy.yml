name: Backend Preview Deploy

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
    branches: [main, production]
    paths:
      - "backend/**"
      - ".github/scripts/preview-service-name.sh"
      - ".github/workflows/backend-deploy.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  ARTIFACT_REGISTRY: us-central1-docker.pkg.dev
  # Dynamic service name: production, dev, or PR-specific preview
  SERVICE_NAME: >-
    ${{ github.event_name == 'pull_request' && format('cdp-server-preview-pr-{0}', github.event.pull_request.number) ||
        (github.ref == 'refs/heads/production' && 'cdp-server-prod' || 'cdp-server-dev') }}
  IS_PREVIEW: ${{ github.event_name == 'pull_request' }}
  ENVIRONMENT: ${{ github.ref == 'refs/heads/production' && 'production' || 'development' }}

jobs:
  deploy:
    name: Backend preview / deploy
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || (github.event.pull_request.draft == false && (github.event.action != 'edited' || github.event.changes.title != null))
    permissions:
      contents: read
      id-token: write
      pull-requests: write

    steps:
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          # This removes Android, .NET, and Haskell to free up ~20GB
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine backend service name
        id: service-name
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          DEFAULT_SERVICE: ${{ env.SERVICE_NAME }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            SERVICE=$(bash .github/scripts/preview-service-name.sh backend "$PR_TITLE" "$PR_NUMBER")
          else
            SERVICE="$DEFAULT_SERVICE"
          fi

          echo "service=$SERVICE" >> "$GITHUB_OUTPUT"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Get Backend Smoke Test Secrets
        id: backend-secrets
        uses: google-github-actions/get-secretmanager-secrets@v2
        with:
          secrets: |-
            API_KEY:${{ env.PROJECT_ID }}/${{ env.ENVIRONMENT }}-API_KEY

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.ARTIFACT_REGISTRY }} --quiet

      - name: Build and push Docker image
        working-directory: backend
        run: |
          IMAGE_TAG="${{ env.ARTIFACT_REGISTRY }}/${{ env.PROJECT_ID }}/cdp/${{ steps.service-name.outputs.service }}:${{ github.sha }}"
          IMAGE_LATEST="${{ env.ARTIFACT_REGISTRY }}/${{ env.PROJECT_ID }}/cdp/${{ steps.service-name.outputs.service }}:latest"

          docker build --pull --no-cache -t $IMAGE_TAG -t $IMAGE_LATEST .
          docker push $IMAGE_TAG
          docker push $IMAGE_LATEST

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ steps.service-name.outputs.service }}
          region: ${{ env.REGION }}
          image: ${{ env.ARTIFACT_REGISTRY }}/${{ env.PROJECT_ID }}/cdp/${{ steps.service-name.outputs.service }}:${{ github.sha }}
          flags: |
            --allow-unauthenticated
            --add-cloudsql-instances=${{ env.PROJECT_ID }}:${{ env.REGION }}:${{ env.ENVIRONMENT == 'production' && 'cdp-prod' || 'cdp-test' }}
            --min-instances=0
            --max-instances=${{ env.IS_PREVIEW == 'true' && '2' || '10' }}
            --memory=2Gi
            --cpu=2
            --timeout=300
          labels: |
            environment=${{ env.ENVIRONMENT }}
            component=backend
            preview=${{ env.IS_PREVIEW }}
            pr-number=${{ github.event.pull_request.number || 'none' }}
            managed-by=github-actions
            commit-sha=${{ github.sha }}
          secrets: |
            POSTGRES_PASSWORD=${{ env.ENVIRONMENT }}-POSTGRES_PASSWORD:latest
            API_KEY=${{ env.ENVIRONMENT }}-API_KEY:latest
            LLM_API_KEY=${{ env.ENVIRONMENT }}-LLM_API_KEY:latest
            GOOGLE_API_KEY=${{ env.ENVIRONMENT }}-LLM_API_KEY:latest
            ALLOWED_ORIGINS=${{ env.ENVIRONMENT }}-ALLOWED_ORIGINS:latest
            POSTGRES_HOST=${{ env.ENVIRONMENT }}-POSTGRES_HOST:latest
            POSTGRES_DB=${{ env.ENVIRONMENT }}-POSTGRES_DB:latest
            POSTGRES_USER=${{ env.ENVIRONMENT }}-POSTGRES_USER:latest
          env_vars: |
            PROJECT_ID=${{ env.PROJECT_ID }}
            LOCATION=${{ env.REGION }}
            APP_ENV=${{ env.ENVIRONMENT == 'preview' && 'staging' || env.ENVIRONMENT }}
            DEBUG=${{ env.ENVIRONMENT == 'production' && 'false' || 'true' }}
            LOG_FORMAT=json
            POSTGRES_PORT=5432
            RATE_LIMIT_CHAT=10 per minute
            RATE_LIMIT_SUGGEST_FOLLOW_UPS=10 per minute
          env_vars_update_strategy: overwrite

      - name: Show deployed service URL
        run: echo "Deployed to ${{ steps.deploy.outputs.url }}"

      - name: Verify deployment smoke tests
        env:
          BACKEND_URL: ${{ steps.deploy.outputs.url }}
          BACKEND_API_KEY: ${{ steps.backend-secrets.outputs.API_KEY }}
          SMOKE_TEST_LOCATION_ORG_ID: "834406"
          SMOKE_TEST_LOCATION_EXPECTED_STATUS: ${{ env.ENVIRONMENT == 'production' && '200' || '' }}
          SMOKE_TEST_TRANSLATION_ORG_ID: "59677"
          SMOKE_TEST_TRANSLATION_TARGET_LANGUAGE: "es"
        run: bash backend/scripts/smoke_test_deployment.sh

      - name: Comment PR with preview URL
        if: github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ## 🚀 Backend Preview Deployed

            **URL:** ${{ steps.deploy.outputs.url }}
            **Commit:** `${{ github.sha }}`
            **Environment:** staging
            **Database:** dev

            ### Quick Tests
            ```bash
            # Health check
            curl ${{ steps.deploy.outputs.url }}/api/v1/health

            # API docs
            open ${{ steps.deploy.outputs.url }}/docs
            ```

            > This preview will be automatically deleted when the PR is closed.
