name: AI Server Deploy to Cloud Run

on:
  push:
    branches: [main, production]
    paths:
      - "ai-server/**"
      - "!ai-server/app/prompts/system_prompt.md"
      - ".github/workflows/ai-server-deploy.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  ARTIFACT_REGISTRY: us-central1-docker.pkg.dev
  SERVICE_NAME: cdp-ai-server

jobs:
  deploy:
    name: AI server / deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ env.PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Get AI Server Secrets from Secret Manager
        id: ai-server-secrets
        uses: google-github-actions/get-secretmanager-secrets@v2
        with:
          secrets: |-
            AI_SERVER_API_KEY:${{ env.PROJECT_ID }}/shared-AI_SERVER_API_KEY

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.ARTIFACT_REGISTRY }} --quiet

      - name: Build and push Docker image
        working-directory: ai-server
        run: |
          IMAGE_TAG="${{ env.ARTIFACT_REGISTRY }}/${{ env.PROJECT_ID }}/cdp/${{ env.SERVICE_NAME }}:${{ github.sha }}"
          IMAGE_LATEST="${{ env.ARTIFACT_REGISTRY }}/${{ env.PROJECT_ID }}/cdp/${{ env.SERVICE_NAME }}:latest"

          docker build --pull --no-cache -t $IMAGE_TAG -t $IMAGE_LATEST .
          docker push $IMAGE_TAG
          docker push $IMAGE_LATEST

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.ARTIFACT_REGISTRY }}/${{ env.PROJECT_ID }}/cdp/${{ env.SERVICE_NAME }}:${{ github.sha }}
          flags: |
            --allow-unauthenticated
            --min-instances=0
            --max-instances=10
            --memory=1Gi
            --cpu=1
            --timeout=300
            --port=8080
          labels: |
            environment=shared
            managed-by=github-actions
            commit-sha=${{ github.sha }}
          secrets: |
            LLM_API_KEY=development-LLM_API_KEY:latest
            ALLOWED_ORIGINS=development-ALLOWED_ORIGINS:latest
            AI_SERVER_API_KEY=shared-AI_SERVER_API_KEY:latest
          env_vars: |
            LLM_MODEL=gemini-2.5-flash
            SYSTEM_PROMPT_CACHE_SECONDS=60
            RAGGLE_OTEL_ENABLED=true
            RAGGLE_OTEL_BASE_URL=https://otelapi.raggle.co
            RAGGLE_OTEL_API_TOKEN=${{ secrets.RAGGLE_OTEL_API_TOKEN }}
            RAGGLE_OTEL_PROJECT_ID=cdp-ai-server
            RAGGLE_OTEL_CAPTURE_CONTENT=true
            RAGGLE_OTEL_TIMEOUT_SECONDS=10
          env_vars_update_strategy: overwrite

      - name: Verify deployment health
        run: |
          URL="${{ steps.deploy.outputs.url }}"
          echo "Checking health of $URL..."
          for i in {1..12}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "Authorization: Bearer ${{ steps.ai-server-secrets.outputs.AI_SERVER_API_KEY }}" \
              -H "X-API-Key: ${{ steps.ai-server-secrets.outputs.AI_SERVER_API_KEY }}" \
              "$URL/v1/models" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "AI server deployment is healthy (HTTP $STATUS)"
              exit 0
            fi
            echo "Attempt $i/12: HTTP $STATUS, waiting 5s..."
            sleep 5
          done
          echo "AI server deployment health check failed"
          exit 1

      - name: Verify CORS preflight
        run: |
          URL="${{ steps.deploy.outputs.url }}"
          HEADERS=$(mktemp)
          STATUS=$(curl -s -o /tmp/cors-preflight-body -D "$HEADERS" -w "%{http_code}" \
            -X OPTIONS \
            -H "Origin: https://cdp-action-explorer.net" \
            -H "Access-Control-Request-Method: POST" \
            -H "Access-Control-Request-Headers: authorization,content-type,x-api-key" \
            "$URL/v1/suggest-follow-ups" || echo "000")

          cat "$HEADERS"
          cat /tmp/cors-preflight-body

          if [ "$STATUS" != "200" ]; then
            echo "CORS preflight failed with HTTP $STATUS"
            exit 1
          fi

          if ! grep -iq "access-control-allow-methods: .*POST" "$HEADERS"; then
            echo "CORS preflight did not allow POST"
            exit 1
          fi

          if ! grep -iq "access-control-allow-headers: .*x-api-key" "$HEADERS"; then
            echo "CORS preflight did not allow X-API-Key"
            exit 1
          fi

      - name: Show deployed service URL
        run: echo "Deployed AI server to ${{ steps.deploy.outputs.url }}"
