<mat-toolbar class="header-toolbar">
  <span class="header-title">CDP</span>

  @if (isLoggedIn()) {
    <nav class="nav-links">
      @for (item of navItems; track item.path) {
        <a mat-button [routerLink]="item.path" routerLinkActive="active-link">
          {{ item.label }}
        </a>
      }
    </nav>

    <div class="header-right">
      <div class="session-box">
        <mat-icon class="session-icon">folder</mat-icon>
        <span class="session-text">{{ truncatedSessionId() }}</span>
      </div>
      <button mat-raised-button (click)="createNewSession()" class="header-button">
        <mat-icon>add</mat-icon>
        New Session
      </button>
      <button mat-raised-button (click)="logOut()" class="header-button">
        <mat-icon>logout</mat-icon>
        Logout
      </button>
    </div>
  }
</mat-toolbar>
