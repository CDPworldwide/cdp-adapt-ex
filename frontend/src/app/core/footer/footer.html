<footer
  aria-label="Site footer"
  class="bg-cdp-neutral-08 text-cdp-neutral-02 p-4 lg:p-[30px_5%] flex flex-col lg:flex-row lg:items-baseline justify-start text-sm border-t border-[#4a4a4a] gap-5"
>
  <div class="flex items-baseline gap-4">
    <a href="https://www.cdp.net/en" target="_blank" rel="noopener noreferrer">
      <app-cdp-logo-with-text-icon color="#ffffff"></app-cdp-logo-with-text-icon>
    </a>
    <span class="text-cdp-neutral-02 whitespace-nowrap">© 2026 CDP Worldwide</span>
  </div>
  <nav class="flex flex-wrap gap-x-10 gap-y-2.5">
    <a
      href="https://classic.cdp.net/en/data/corporate-environmental-action-tracker/terms-of-use"
      target="_blank"
      rel="noopener noreferrer"
      class="text-cdp-neutral-02 underline whitespace-nowrap hover:text-white active:text-cdp-neutral-05 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-cdp-red focus-visible:ring-offset-2 focus-visible:ring-offset-cdp-neutral-08 transition-colors"
      >{{ 'locationCard.footer.termsOfUse' | translate }}</a
    >
    <a
      routerLink="/methodology"
      class="text-cdp-neutral-02 underline whitespace-nowrap hover:text-white active:text-cdp-neutral-05 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-cdp-red focus-visible:ring-offset-2 focus-visible:ring-offset-cdp-neutral-08 transition-colors"
      >{{ 'locationCard.footer.methodology' | translate }}</a
    >
    <a
      href="https://data.cdp.net/"
      target="_blank"
      rel="noopener noreferrer"
      class="text-cdp-neutral-02 underline whitespace-nowrap hover:text-white active:text-cdp-neutral-05 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-cdp-red focus-visible:ring-offset-2 focus-visible:ring-offset-cdp-neutral-08 transition-colors"
      >{{ 'locationCard.footer.downloadAllData' | translate }}</a
    >
    <a
      href="https://www.cdp.net/en/privacy-policy"
      target="_blank"
      rel="noopener noreferrer"
      class="text-cdp-neutral-02 underline whitespace-nowrap"
      >{{ 'locationCard.footer.privacyNotice' | translate }}</a
    >
    <a
      href="https://cdp.net/en/contact-us"
      target="_blank"
      rel="noopener noreferrer"
      class="text-cdp-neutral-02 underline whitespace-nowrap hover:text-white active:text-cdp-neutral-05 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-cdp-red focus-visible:ring-offset-2 focus-visible:ring-offset-cdp-neutral-08 transition-colors"
      >{{ 'locationCard.footer.contactUs' | translate }}</a
    >
  </nav>
</footer>
