<div class="chat-page flex min-h-0 flex-1 flex-col bg-cdp-bg text-cdp-dark">
  <nav [attr.aria-label]="'shared.mainNavigation' | translate" class="flex-shrink-0">
    <app-header [chatMode]="true"></app-header>
  </nav>

  <div
    id="page-content"
    tabindex="-1"
    class="chat-page-content flex min-h-0 flex-1 flex-col focus:outline-none"
  >
    <div class="chat-page-ambient" aria-hidden="true"></div>

    <section
      class="chat-tool-shell mx-auto flex min-h-0 w-full flex-1 flex-col overflow-hidden bg-white"
      [attr.aria-label]="'askCdpAi.buttonText' | translate"
    >
      <app-ask-cdp-ai
        class="standalone-chat block min-h-0 flex-1"
        [locationData]="locationData"
        [contextArea]="'hazards'"
        [isOpen]="true"
        [showCloseButton]="false"
        [showPanelHeader]="false"
        [showSuggestions]="false"
        [showLocalTestControls]="showLocalTestControls"
        (locationDataCleared)="clearLocationContext()"
      ></app-ask-cdp-ai>
    </section>
  </div>
</div>
