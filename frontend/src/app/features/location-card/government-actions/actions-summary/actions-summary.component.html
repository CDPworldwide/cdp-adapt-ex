<section>
  <h2
    class="text-base font-medium font-roboto leading-6 tracking-[0.5px] text-cdp-dark uppercase pt-6 pb-2 px-4 lg:px-0"
  >
    {{ 'locationCard.govActions.filterByHazard' | translate }}
  </h2>

  <div class="flex gap-2 overflow-x-auto touch-pan-x mt-4 px-4 lg:px-0 lg:flex-wrap lg:gap-2.5 lg:overflow-x-visible lg:touch-auto">
    <!-- All button -->
    <button
      type="button"
      (click)="selectFilter(null)"
      class="w-20 h-20 shrink-0 lg:w-[84px] lg:h-[84px] p-2 flex items-center justify-center cursor-pointer transition-[opacity,background-color,box-shadow] hover:opacity-90 active:opacity-80 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-cdp-red focus-visible:ring-offset-2"
      [class.bg-cdp-dark]="isSelected(null)"
      [class.bg-cdp-neutral-02]="!isSelected(null)"
    >
      <span
        class="text-sm font-[450] font-roboto leading-4 tracking-[0.1px] text-center"
        [class.text-cdp-light-text]="isSelected(null)"
        [class.text-cdp-border]="!isSelected(null)"
      >
        {{ 'locationCard.govActions.all' | translate }}
      </span>
    </button>
    <!-- Hazard buttons -->
    @for (row of summaryRows; track trackRow($index, row)) {
      <button
        type="button"
        (click)="selectFilter(hazardKey(row))"
        class="w-20 h-20 shrink-0 lg:w-[84px] lg:h-[84px] p-2 flex flex-col items-center justify-center gap-1 cursor-pointer transition-[opacity,background-color,box-shadow] overflow-hidden hover:opacity-90 active:opacity-80 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-cdp-red focus-visible:ring-offset-2 touch-pan-x lg:touch-auto"
        [class.bg-cdp-dark]="isSelected(hazardKey(row))"
        [class.bg-cdp-neutral-02]="!isSelected(hazardKey(row))"
        [matTooltip]="
          row.hazard.otherHazardDetails
            ? (hazardName(row) || 'Other')
            : (hazardTranslationKey(row) | translate)
        "
        matTooltipPosition="above"
        matTooltipTouchGestures="off"
      >
        <app-hazard-icon
          [hazard]="row.hazard.hazardType"
          [otherHazardDetails]="row.hazard.otherHazardDetails"
          size="24"
          [color]="isSelected(hazardKey(row)) ? '#E7E9E8' : 'black'"
          [showTooltip]="false"
          class="shrink-0"
        ></app-hazard-icon>
        <span
          class="text-sm font-[450] font-roboto leading-4 tracking-[0.1px] text-center line-clamp-2 w-full break-words"
          [class.text-cdp-light-text]="isSelected(hazardKey(row))"
          [class.text-cdp-border]="!isSelected(hazardKey(row))"
        >
          @if (row.hazard.otherHazardDetails) {
            {{ hazardName(row) }}
          } @else {
            {{ hazardTranslationKey(row) | translate }}
          }
        </span>
      </button>
    }
  </div>
</section>
