<!-- Location Card - Mobile First Design -->
<div class="w-full bg-cdp-bg relative" *ngIf="data">
  <!-- Back to Map Button -->
  <div class="flex items-center pt-4 pb-0 px-0 lg:p-4 lg:pb-0">
    <button
      type="button"
      (click)="goBackToMap()"
      class="flex flex-row justify-center items-center px-3 lg:px-4 py-[10px] gap-2 rounded-xl hover:bg-gray-100 active:bg-gray-200 cursor-pointer transition-colors"
    >
      <svg
        width="20"
        height="20"
        viewBox="0 0 20 20"
        fill="none"
        xmlns="http://www.w3.org/2000/svg"
      >
        <path
          d="M6.52051 10.8333L11.1872 15.5L9.99967 16.6667L3.33301 10L9.99967 3.33334L11.1872 4.5L6.52051 9.16667H16.6663V10.8333H6.52051Z"
          fill="black"
        />
      </svg>
      <span class="text-black font-roboto text-sm font-medium leading-5 tracking-[0.1px]">{{
        'locationCard.backToMap' | translate
      }}</span>
    </button>
  </div>

  <!-- Location Header -->
  <div class="flex items-center gap-4 px-4 lg:px-6 pt-10 pb-4">
    <!-- Map Thumbnail -->
    <div
      class="hidden lg:block w-20 h-20 lg:w-[120px] lg:h-[120px] flex-shrink-0 overflow-hidden rounded-[20px]"
    >
      <app-hazard-map
        *ngIf="data.lat != null && data.lng != null"
        [lat]="data.lat"
        [lng]="data.lng"
        [locationName]="data.name"
        [zoom]="6"
        [showExpand]="false"
        [static]="true"
        [grayscale]="false"
        [geometry]="data.geometry"
        [calculatedBounds]="jurisdictionBounds"
      ></app-hazard-map>
    </div>
    <!-- Left Container -->
    <div class="flex-1 flex flex-col gap-2 -translate-y-1">
      <!-- Name Container -->
      <div class="flex flex-col">
        <h1
          class="text-4xl lg:text-[60px] text-[#1B232C] font-roboto font-normal leading-tight lg:leading-normal tracking-[-1.8px]"
        >
          {{ data.name }}
          <span class="text-3xl lg:text-[40px] block">{{ data.countryName }}</span>
        </h1>

        <!-- Population -->
        <div class="flex items-center gap-1 mt-4" *ngIf="data.population">
          <div class="text-black font-roboto text-xs font-medium leading-4 tracking-[0.4px]">
            {{ 'locationCard.header.estimatedPopulation' | translate }}
          </div>
          <div class="text-black font-roboto text-xs font-normal leading-4 tracking-[0.4px]">
            ~{{ formatPopulation(data.population) }}
          </div>
          <div
            matTooltip="{{
              'locationCard.header.populationTooltip' | translate: { location: data.name }
            }}"
            class="flex items-center justify-center cursor-pointer group"
          >
            <app-info-icon
              size="10"
              class="text-cdp-neutral-05 group-hover:text-cdp-dark transition-colors"
            ></app-info-icon>
          </div>
        </div>
      </div>
    </div>

    <!-- Right Actions -->
  </div>

  <!-- Tab Navigation -->
  <div
    class="flex flex-col items-start self-stretch h-[90px] pt-10 pb-4 px-4 lg:px-6"
    role="tablist"
  >
    <div
      class="flex items-end gap-2 lg:gap-20 flex-1 border-b border-[#bfbfbf] -mx-4 lg:mx-0 px-4 lg:px-0 justify-between lg:justify-start self-stretch"
    >
      <button
        (click)="setActiveTab('hazards')"
        class="text-[#1e1e1e] text-center font-roboto text-sm tracking-[0.25px] transition-colors hover:text-cdp-red active:text-black focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-cdp-red focus-visible:ring-offset-2 rounded-sm"
        [ngClass]="activeTab === 'hazards' ? 'font-medium leading-8' : 'font-normal leading-5'"
        role="tab"
        [attr.aria-selected]="activeTab === 'hazards'"
        aria-controls="hazards-panel"
      >
        <span
          class="inline-block pb-[15px] whitespace-nowrap"
          [class.border-b]="activeTab === 'hazards'"
          [class.border-[#1e1e1e]]="activeTab === 'hazards'"
        >
          {{ 'locationCard.tabs.hazards' | translate }}
        </span>
      </button>
      <button
        (click)="setActiveTab('actions')"
        class="text-[#1e1e1e] text-center font-roboto text-sm tracking-[0.25px] transition-colors hover:text-cdp-red active:text-black focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-cdp-red focus-visible:ring-offset-2 rounded-sm"
        [ngClass]="activeTab === 'actions' ? 'font-medium leading-8' : 'font-normal leading-5'"
        role="tab"
        [attr.aria-selected]="activeTab === 'actions'"
        aria-controls="government-actions-panel"
      >
        <span
          class="inline-block pb-[15px] whitespace-nowrap"
          [class.border-b]="activeTab === 'actions'"
          [class.border-[#1e1e1e]]="activeTab === 'actions'"
        >
          {{ 'locationCard.tabs.governmentActions' | translate }}
        </span>
      </button>
      <button
        (click)="setActiveTab('solutions')"
        class="text-[#1e1e1e] text-center font-roboto text-sm tracking-[0.25px] transition-colors hover:text-cdp-red active:text-black focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-cdp-red focus-visible:ring-offset-2 rounded-sm"
        [ngClass]="activeTab === 'solutions' ? 'font-medium leading-8' : 'font-normal leading-5'"
        role="tab"
        [attr.aria-selected]="activeTab === 'solutions'"
        aria-controls="solutions-panel"
      >
        <span
          class="inline-block pb-[15px] whitespace-nowrap"
          [class.border-b]="activeTab === 'solutions'"
          [class.border-[#1e1e1e]]="activeTab === 'solutions'"
        >
          {{ 'locationCard.tabs.solutions' | translate }}
        </span>
      </button>
    </div>
  </div>

  <!-- Tab Content -->
  <div class="pt-4 pb-6 px-0 lg:px-6">
    <!-- Hazards Tab -->
    <div *ngIf="activeTab === 'hazards'" id="hazards-panel" role="tabpanel">
      <app-hazards
        [data]="data"
        [jurisdictionBounds]="jurisdictionBounds"
        (exploreActions)="exploreHazardActions($event)"
      ></app-hazards>
    </div>

    <!-- Government actions Tab -->
    <div *ngIf="activeTab === 'actions'" id="government-actions-panel" role="tabpanel">
      <app-government-actions
        [data]="data.governmentActions"
        [locationName]="data.name"
        [countryName]="data.countryName"
        [selectedFilter]="selectedHazardFilter"
        [disclosureYear]="data.disclosureYear"
      ></app-government-actions>
    </div>

    <!-- Solutions Tab -->
    <div
      *ngIf="activeTab === 'solutions'"
      class="min-h-[200px]"
      id="solutions-panel"
      role="tabpanel"
    >
      <app-solutions [data]="data"></app-solutions>
    </div>
  </div>
</div>

<footer class="shrink-0">
  <app-footer />
</footer>
