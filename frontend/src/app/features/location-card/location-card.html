<!-- Location Card - Mobile First Design -->
<div class="w-full max-w-7xl mx-auto bg-cdp-bg relative" *ngIf="data">
  <!-- Back to Map Button -->
  <div class="flex items-center p-4">
    <button
      type="button"
      (click)="goBackToMap()"
      class="flex flex-row justify-center items-center px-3 py-1.5 gap-1 min-w-32 w-auto h-8 rounded-xl hover:bg-gray-100 active:bg-gray-200 cursor-pointer transition-colors"
    >
      <svg
        width="20"
        height="20"
        viewBox="0 0 24 24"
        fill="none"
        xmlns="http://www.w3.org/2000/svg"
      >
        <path
          d="M19 12H5M5 12L12 19M5 12L12 5"
          stroke="#000000"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
      </svg>
      <span class="font-medium text-sm leading-5 tracking-[0.1px] text-black whitespace-nowrap">{{
        'locationCard.backToMap' | translate
      }}</span>
    </button>
  </div>

  <!-- Location Header -->
  <div class="flex items-center p-4 gap-4">
    <!-- Map Thumbnail -->
    <div class="w-20 h-20 lg:w-36 lg:h-36 flex-shrink-0 overflow-hidden rounded">
      <app-hazard-map
        *ngIf="data.lat != null && data.lng != null"
        [lat]="data.lat"
        [lng]="data.lng"
        [locationName]="data.name"
        [zoom]="6"
        [showExpand]="false"
        [static]="true"
        [grayscale]="false"
        [geometry]="data.geometry"
        [calculatedBounds]="jurisdictionBounds"
      ></app-hazard-map>
    </div>
    <!-- Left Container -->
    <div class="flex-1 flex flex-col gap-2">
      <!-- Name Container -->
      <div class="flex flex-col">
        <h1
          class="text-4xl lg:text-6xl self-stretch justify-start text-zinc-800 font-normal lg:leading-tight"
        >
          {{ data.name }}, {{ data.countryName }}
        </h1>
        <!-- Population -->
        <div class="flex items-center gap-1 mt-1" *ngIf="data.population">
          <div class="text-black text-xs font-medium font-roboto leading-4 tracking-wide">
            {{ 'locationCard.header.estimatedPopulation' | translate }}
          </div>
          <div class="flex items-center">
            <div class="text-black text-xs font-normal font-roboto leading-4 tracking-wide">~</div>
            <div class="text-black text-xs font-normal font-roboto leading-4 tracking-wide">
              {{ formatPopulation(data.population) }}
            </div>
          </div>
          <button
            type="button"
            matTooltip="{{
              'locationCard.header.populationTooltip' | translate: { location: data.name }
            }}"
            aria-label="Population information"
            class="flex items-center justify-center cursor-pointer group"
          >
            <app-info-icon
              size="14"
              class="text-cdp-neutral-05 group-hover:text-cdp-dark transition-colors"
            ></app-info-icon>
          </button>
        </div>
      </div>
    </div>

    <!-- Right Actions -->
  </div>

  <!-- Tab Navigation -->
  <div class="flex border-b border-gray-200 px-0 lg:px-6" role="tablist">
    <button
      (click)="setActiveTab('hazards')"
      class="flex-1 py-3 px-2 text-sm font-medium text-center transition-colors"
      [ngClass]="{
        'text-gray-900 border-b-2 border-gray-900': activeTab === 'hazards',
        'text-cdp-dark hover:text-cdp-dark': activeTab !== 'hazards'
      }"
      id="tab-hazards"
      role="tab"
      [attr.aria-selected]="activeTab === 'hazards'"
      aria-controls="hazards-panel"
    >
      {{ 'locationCard.tabs.hazards' | translate }}
    </button>
    <button
      (click)="setActiveTab('actions')"
      class="flex-1 py-3 px-2 text-sm font-medium text-center transition-colors"
      [ngClass]="{
        'text-gray-900 border-b-2 border-gray-900': activeTab === 'actions',
        'text-cdp-dark hover:text-cdp-dark': activeTab !== 'actions'
      }"
      id="tab-actions"
      role="tab"
      [attr.aria-selected]="activeTab === 'actions'"
      aria-controls="government-actions-panel"
    >
      {{ 'locationCard.tabs.governmentActions' | translate }}
    </button>
    <button
      (click)="setActiveTab('solutions')"
      class="flex-1 py-3 px-2 text-sm font-medium text-center transition-colors"
      [ngClass]="{
        'text-gray-900 border-b-2 border-gray-900': activeTab === 'solutions',
        'text-cdp-dark hover:text-cdp-dark': activeTab !== 'solutions'
      }"
      id="tab-solutions"
      role="tab"
      [attr.aria-selected]="activeTab === 'solutions'"
      aria-controls="solutions-panel"
    >
      {{ 'locationCard.tabs.solutions' | translate }}
    </button>
  </div>

  <!-- Tab Content -->
  <div class="py-6 px-0 lg:px-6">
    <!-- Hazards Tab -->
    <div
      *ngIf="activeTab === 'hazards'"
      id="hazards-panel"
      role="tabpanel"
      aria-labelledby="tab-hazards"
    >
      <app-hazards
        [data]="data"
        [jurisdictionBounds]="jurisdictionBounds"
        (exploreActions)="exploreHazardActions($event)"
        (tabChange)="setActiveTab($event)"
      ></app-hazards>
    </div>

    <!-- Government actions Tab -->
    <div
      *ngIf="activeTab === 'actions'"
      id="government-actions-panel"
      role="tabpanel"
      aria-labelledby="tab-actions"
    >
      <app-government-actions
        [data]="data.governmentActions"
        [locationName]="data.name"
        [countryName]="data.countryName"
        [disclosureYear]="data.disclosureYear"
        [selectedFilter]="selectedHazardFilter"
      ></app-government-actions>
    </div>

    <!-- Solutions Tab -->
    <div
      *ngIf="activeTab === 'solutions'"
      class="min-h-[200px]"
      id="solutions-panel"
      role="tabpanel"
      aria-labelledby="tab-solutions"
    >
      <app-solutions [data]="data"></app-solutions>
    </div>
  </div>
</div>

<footer class="shrink-0">
  <app-footer />
</footer>
