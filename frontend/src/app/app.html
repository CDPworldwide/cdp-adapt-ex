<div class="flex h-dvh flex-col overflow-hidden">
  <button
    type="button"
    (click)="skipToMain($event)"
    class="sr-only focus:not-sr-only focus:absolute focus:z-[9999] focus:top-2 focus:left-2 focus:bg-white focus:text-cdp-dark focus:px-4 focus:py-2 focus:rounded focus:shadow-lg focus:outline-2 focus:outline-cdp-red"
  >
    Skip to main content
  </button>
  <main
    id="main-content"
    tabindex="-1"
    class="flex min-h-0 flex-1 flex-col overflow-auto focus:outline-none"
  >
    <router-outlet />
  </main>
  <app-welcome-modal></app-welcome-modal>
  <app-global-search-overlay></app-global-search-overlay>
  <app-feedback-modal></app-feedback-modal>
</div>
