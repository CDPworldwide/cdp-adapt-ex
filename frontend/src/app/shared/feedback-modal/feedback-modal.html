@if (feedbackService.isOpen()) {
  <div
    class="fixed inset-0 z-[2100] flex items-center justify-center p-3 sm:p-6"
    role="dialog"
    aria-modal="true"
    aria-label="Give feedback"
  >
    <button
      type="button"
      class="absolute inset-0 bg-black/55"
      aria-label="Close feedback"
      (click)="feedbackService.close()"
    ></button>

    <section
      class="relative flex h-[88vh] w-full max-w-4xl flex-col overflow-hidden rounded-lg bg-white shadow-cdp-card"
    >
      <div class="flex items-center justify-between border-b border-cdp-neutral-02 px-4 py-3">
        <h2 class="text-base font-semibold text-cdp-dark">Give feedback</h2>
        <button
          type="button"
          class="flex h-9 w-9 items-center justify-center rounded-full text-cdp-dark transition-colors hover:bg-cdp-neutral-01 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-cdp-red focus-visible:ring-offset-2"
          aria-label="Close feedback"
          (click)="feedbackService.close()"
        >
          <mat-icon class="!text-xl">close</mat-icon>
        </button>
      </div>

      <iframe
        class="min-h-0 flex-1 border-0"
        title="CDP Adaptation and Action Explorer feedback form"
        [src]="feedbackService.embedUrl()"
        allow="camera; microphone; autoplay; encrypted-media"
      ></iframe>
    </section>
  </div>
}
