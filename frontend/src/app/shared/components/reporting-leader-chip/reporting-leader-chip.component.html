>
  {{ 'maps.reportingLeader' | translate }}

<app-linked-info-tooltip

  href="https://www.cdp.net/en/data/scores"
  linkTarget="_blank"
  linkRel="noopener noreferrer"
  triggerClass="relative inline-flex items-center justify-center p-1 rounded-full text-cdp-neutral-05 hover:text-cdp-red hover:bg-cdp-neutral-01 active:bg-cdp-neutral-02 transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-cdp-red focus-visible:ring-offset-2 before:absolute before:content-[''] before:-inset-3"
